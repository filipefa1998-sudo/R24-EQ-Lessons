<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Riverton 24th · Elders Quorum Instructor Guide</title>
<meta name="theme-color" content="#1c150e" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#e9ddc2; --paper-2:#e1d2b2; --card:#f4ebd7; --card-2:#efe4cc;
    --ink:#221a12; --ink-2:#3a2e20; --muted:#6f6047; --muted-2:#8c7c60;
    --garnet:#7c2230; --garnet-deep:#5e1824; --gold:#9c7a3c; --gold-soft:#c2a96f; --gold-text:#8a6a2e;
    --line:rgba(34,26,18,.14); --line-strong:rgba(34,26,18,.22);
    --radius:14px; --shadow:0 18px 38px -24px rgba(34,26,18,.5); --maxw:580px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:"Manrope",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.55;min-height:100vh;}
  .app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--paper);box-shadow:0 0 60px -30px rgba(0,0,0,.4);}
  .defs{position:absolute;width:0;height:0;overflow:hidden;}

  .band{height:18px;width:100%;border-top:1.5px solid var(--gold);border-bottom:1.5px solid var(--gold);
    background:var(--paper-2) url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='36'%20height='36'%20viewBox='0%200%2036%2036'%3E%3Crect%20width='36'%20height='36'%20fill='transparent'/%3E%3Cpolygon%20points='18,0%2018,18%200,0'%20fill='%231f1813'/%3E%3Cpolygon%20points='36,18%2018,18%2036,0'%20fill='%231f1813'/%3E%3Cpolygon%20points='0,18%2018,18%200,36'%20fill='%231f1813'/%3E%3Cpolygon%20points='18,36%2018,18%2036,36'%20fill='%231f1813'/%3E%3C/svg%3E");background-repeat:repeat-x;background-position:center;background-size:auto 18px;}

  header.hero{position:relative;background:linear-gradient(168deg,#2c2114 0%,#1a130c 100%);
    padding:calc(env(safe-area-inset-top) + 28px) 22px 24px;text-align:center;overflow:hidden;}
  .hero__wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-46%);width:330px;height:auto;color:var(--gold);opacity:.10;pointer-events:none;}
  .hero__photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .6s;mix-blend-mode:soft-light;}
  .hero__photo.on{opacity:.4;}
  .hero__inner{position:relative;}
  .crest{width:48px;height:80px;margin:0 auto 10px;display:block;color:var(--gold-soft);}
  .hero__eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-soft);font-weight:600;margin:0 0 6px;}
  .hero__title{font-family:"Playfair Display",serif;font-weight:700;font-size:clamp(24px,6.4vw,31px);line-height:1.12;margin:0;color:#f4ebd7;}
  .hero__tongan{font-family:"Playfair Display",serif;font-style:italic;font-weight:500;color:var(--gold-soft);font-size:15px;margin:6px 0 0;}
  .hero__btn{position:absolute;top:calc(env(safe-area-inset-top) + 14px);z-index:5;height:36px;border-radius:20px;
    border:1px solid rgba(194,169,111,.4);background:rgba(244,235,215,.06);color:var(--gold-soft);
    display:flex;align-items:center;gap:6px;cursor:pointer;transition:.2s;font-family:inherit;font-weight:600;font-size:12px;padding:0 13px;}
  .hero__btn:hover{background:rgba(244,235,215,.14);}
  .hero__btn--lang{left:14px;}
  .hero__btn--share{right:14px;width:36px;padding:0;justify-content:center;border-radius:50%;}

  .tabs{display:flex;gap:8px;max-width:var(--maxw);margin:0 auto;padding:16px 18px 6px;position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,var(--paper) 74%,transparent);}
  .tab{flex:1;appearance:none;border:1px solid var(--line-strong);background:var(--card);color:var(--muted);
    font-family:"Manrope",sans-serif;font-weight:600;font-size:13.5px;padding:11px 10px;border-radius:11px;cursor:pointer;
    transition:.2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .tab small{font-style:italic;font-weight:500;font-size:10.5px;color:var(--muted-2);}
  .tab[aria-selected="true"]{background:var(--garnet);border-color:var(--garnet);color:#f4ebd7;box-shadow:0 8px 18px -10px rgba(124,34,48,.7);}
  .tab[aria-selected="true"] small{color:rgba(244,235,215,.78);}
  .tab:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  .panel{padding:8px 18px 0;display:none;animation:rise .35s ease;}
  .panel.on{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .divider{display:flex;align-items:center;gap:14px;margin:26px 4px 14px;color:var(--gold);}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line-strong),transparent);}
  .divider .fd{width:22px;height:38px;color:var(--gold);flex:0 0 auto;}
  .section-label{display:flex;align-items:center;gap:10px;margin:22px 2px 12px;font-size:11px;letter-spacing:.26em;
    text-transform:uppercase;color:var(--muted-2);font-weight:700;}
  .section-label::after{content:"";flex:1;height:1px;background:var(--line);}

  .cadence{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold);
    border-radius:11px;padding:11px 14px;margin:4px 2px 0;font-size:13px;color:var(--muted);}
  .cadence b{color:var(--garnet);font-weight:700;}

  /* ---------- lesson card (WJ8 layout) ---------- */
  .lcard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
  .lcard--now{border-color:var(--garnet);box-shadow:0 18px 38px -22px rgba(124,34,48,.45);}
  .lcard__top{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .datepill{display:inline-block;background:rgba(156,122,60,.16);color:var(--gold-text);border:1px solid rgba(156,122,60,.34);
    font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;}
  .nowtag{margin-left:auto;background:var(--garnet);color:#f4ebd7;font-size:10px;font-weight:800;letter-spacing:.13em;
    text-transform:uppercase;padding:4px 10px;border-radius:20px;}
  .lcard__body{display:flex;gap:15px;}
  .lcard__avatar{width:72px;height:72px;border-radius:50%;flex:0 0 auto;background:var(--garnet);background-size:cover;
    background-position:center;display:flex;align-items:center;justify-content:center;color:#f4ebd7;font-weight:800;font-size:20px;
    box-shadow:inset 0 0 0 2px rgba(156,122,60,.5);}
  .lcard__main{flex:1;min-width:0;}
  .lcard__title{font-family:"Playfair Display",serif;font-weight:700;font-size:21px;line-height:1.2;margin:0 0 2px;color:var(--ink);}
  .lcard__title2{font-family:"Playfair Display",serif;font-weight:600;font-style:italic;font-size:15px;color:var(--gold);margin:0;}
  .lcard__quote{font-family:"Playfair Display",serif;font-style:italic;font-size:14.5px;color:var(--ink-2);margin:10px 0 3px;line-height:1.45;}
  .lcard__quote2{font-size:13px;color:var(--muted);margin:0;line-height:1.45;}
  .lcard__speaker{font-size:13px;color:var(--muted-2);margin:10px 0 0;}
  .lcard__speaker b{color:var(--ink-2);font-weight:700;}
  .lcard__foot{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line);}
  .lcard__foot .cap{color:var(--gold);flex:0 0 auto;}
  .taught-label{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted-2);font-weight:700;}
  .taught-name{font-size:13.5px;color:var(--ink-2);font-weight:600;}
  .foot-right{margin-left:auto;display:inline-flex;align-items:center;gap:12px;}
  .lcard__open{color:var(--garnet);display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;text-decoration:none;}
  .lcard__open:hover{text-decoration:underline;}
  .lcard__edit{background:none;border:none;color:var(--muted-2);font-size:18px;cursor:pointer;padding:2px;}
  .lcard__edit:hover{color:var(--garnet);}

  /* Savior's Way */
  .sw-intro{color:var(--muted);font-size:15px;margin:4px 2px 8px;}
  .sw-photo{height:160px;border-radius:var(--radius);margin:16px 0 4px;overflow:hidden;position:relative;
    background:var(--card-2);background-size:cover;background-position:center;border:1px solid var(--line);}
  .sw-photo .ph-note{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted-2);font-size:12px;padding:20px;}
  .sw-photo code{color:var(--garnet);}
  .part-head{font-family:"Playfair Display",serif;font-weight:600;font-size:18px;color:var(--ink);margin:0;}
  .part-tongan{font-style:italic;color:var(--gold);font-size:12.5px;margin:2px 0 0;}
  .sec-card{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:14px 16px;margin-bottom:11px;box-shadow:0 6px 16px -16px rgba(0,0,0,.5);}
  .sec-card h4{font-family:"Playfair Display",serif;font-weight:600;font-size:16px;margin:0 0 4px;color:var(--ink);}
  .sec-card p{margin:0 0 10px;color:var(--muted);font-size:13.5px;}
  .read-link{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--garnet);text-decoration:none;}
  .read-link:hover{text-decoration:underline;}
  blockquote.scripture{margin:18px 2px;padding:16px 18px;border-radius:12px;background:linear-gradient(180deg,rgba(124,34,48,.07),rgba(124,34,48,.02));border:1px solid rgba(124,34,48,.2);}
  blockquote.scripture p{margin:0 0 6px;font-family:"Playfair Display",serif;font-style:italic;font-size:16px;color:var(--ink);}
  blockquote.scripture cite{font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--garnet);font-style:normal;}
  .manual-cta{display:block;text-align:center;background:var(--ink);color:#f4ebd7;text-decoration:none;font-weight:700;font-size:14px;border-radius:12px;padding:15px;margin:18px 2px 6px;}
  .manual-cta:hover{background:var(--ink-2);}

  .admin-bar{display:flex;gap:8px;align-items:center;margin:22px 2px 6px;flex-wrap:wrap;}
  .btn{appearance:none;cursor:pointer;font-family:"Manrope",sans-serif;font-weight:600;font-size:13px;border-radius:10px;padding:10px 15px;border:1px solid var(--line-strong);background:var(--card);color:var(--ink);transition:.2s;}
  .btn:hover{border-color:var(--garnet);}
  .btn--garnet{background:var(--garnet);border-color:var(--garnet);color:#f4ebd7;}
  .btn--ghost{background:transparent;}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  .editing-note{font-size:12px;color:var(--garnet);}
  .signout-link{background:none;border:none;color:var(--muted-2);font-size:12px;cursor:pointer;text-decoration:underline;padding:4px;}

  .modal{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;justify-content:center;}
  .modal.on{display:flex;}
  .modal__scrim{position:absolute;inset:0;background:rgba(28,18,10,.55);backdrop-filter:blur(3px);}
  .modal__card{position:relative;width:100%;max-width:var(--maxw);background:var(--card);border:1px solid var(--line-strong);
    border-radius:18px 18px 0 0;padding:22px 20px calc(env(safe-area-inset-bottom) + 22px);max-height:88vh;overflow:auto;
    box-shadow:0 -20px 50px -20px rgba(0,0,0,.45);animation:rise .3s ease;}
  .modal__card h2{font-family:"Playfair Display",serif;font-size:20px;margin:0 0 14px;color:var(--ink);}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin-bottom:5px;}
  .field input{width:100%;background:var(--paper);border:1px solid var(--line-strong);color:var(--ink);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;}
  .field input:focus{outline:none;border-color:var(--garnet);}
  .field .hint{font-size:11px;color:var(--muted-2);margin-top:4px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}
  .modal__row{display:flex;gap:10px;margin-top:8px;}
  .modal__row .btn{flex:1;}
  .delete-link{background:none;border:none;color:var(--garnet);font-size:13px;cursor:pointer;margin-top:10px;padding:4px;}
  .signin-error{color:var(--garnet);font-size:13px;margin:4px 0 0;display:none;}

  .share-list{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
  .share-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--paper);color:var(--ink);text-decoration:none;font-weight:600;font-size:14px;cursor:pointer;}
  .share-item:hover{border-color:var(--garnet);}
  .share-item svg{color:var(--garnet);flex:0 0 auto;}

  footer.tag{text-align:center;color:var(--muted-2);font-size:11px;padding:20px 20px 16px;}
  footer.tag .mark{color:var(--garnet);}
  .sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted-2);margin-right:5px;vertical-align:middle;}
  .sync-dot.live{background:#5b7d3f;}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#f4ebd7;padding:11px 18px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:80;}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
  @media (max-width:420px){.grid2{grid-template-columns:1fr;}}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}

  /* ===== font scale-up (larger, more readable) ===== */
  body{font-size:16.5px;}
  .tab{font-size:15px;} .tab small{font-size:11.5px;}
  .section-label{font-size:12.5px;}
  .cadence{font-size:14.5px;}
  .datepill{font-size:13px;padding:6px 13px;}
  .nowtag{font-size:10.5px;}
  .lcard__avatar{width:82px;height:82px;font-size:23px;}
  .lcard__title{font-size:23.5px;}
  .lcard__title2{font-size:17px;}
  .lcard__quote{font-size:16px;}
  .lcard__quote2{font-size:14.5px;}
  .lcard__speaker{font-size:14px;}
  .taught-label{font-size:12px;} .taught-name{font-size:14.5px;}
  .lcard__open{font-size:13.5px;}
  .sw-intro{font-size:16.5px;}
  .part-head{font-size:20.5px;}
  .sec-card h4{font-size:18px;} .sec-card p{font-size:15px;} .read-link{font-size:14px;}
  blockquote.scripture p{font-size:18px;}
  .manual-cta{font-size:15.5px;}
  .hero__eyebrow{font-size:12px;} .hero__tongan{font-size:16.5px;}
  .hero__title{font-size:clamp(26px,7vw,34px);}
  .field input{font-size:16px;} .field label{font-size:12px;}
  .btn{font-size:14px;}
  .modal__card h2{font-size:22px;}
  .share-item{font-size:15px;}
  footer.tag{font-size:12px;}

  /* ===== image upload controls ===== */
  .hidden-file{display:none;}
  .photo-edit-row{position:absolute;bottom:12px;left:0;right:0;z-index:4;display:flex;gap:8px;justify-content:center;}
  .photo-edit-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(244,235,215,.12);border:1px solid rgba(194,169,111,.5);
    color:var(--gold-soft);font-family:inherit;font-weight:600;font-size:12px;padding:7px 13px;border-radius:20px;cursor:pointer;}
  .photo-edit-pill:hover{background:rgba(244,235,215,.2);}
  .sw-photo.editable{cursor:pointer;}
  .photo-remove{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(20,12,8,.6);
    color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:15px;z-index:3;}
  .photo-row{display:flex;align-items:center;gap:14px;}
  .photo-prev{width:66px;height:66px;border-radius:50%;background-color:var(--paper-2);background-size:cover;background-position:center;
    border:1px solid var(--line-strong);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:var(--muted-2);font-size:10.5px;text-align:center;}
  .photo-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .modal-context{background:var(--paper-2);border-radius:10px;padding:11px 13px;margin-bottom:16px;font-size:14px;color:var(--muted);line-height:1.35;}
  .modal-context b{color:var(--ink-2);font-weight:700;}
  .more-toggle{background:none;border:none;color:var(--garnet);font-weight:700;font-size:13.5px;cursor:pointer;padding:8px 2px;margin:4px 0 6px;}
</style>
</head>

// ---- storage ----
const LS_KEY = "riverton24-eq-v4";
let schedule = [], media = { heroPhoto:"", saviorPhoto:"" }, editing = false, editId = null, remote = null;
function setSyncLabel(){ $("#syncLabel").textContent = remote ? U("synced") : U("saved"); }
function setSync(live){ $("#syncDot").classList.toggle("live",live); setSyncLabel(); }

async function initStore(){
  if (FIREBASE_CONFIG && FIREBASE_CONFIG.projectId){
    try{
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getFirestore, doc, getDoc, setDoc, onSnapshot } =
        await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const db = getFirestore(initializeApp(FIREBASE_CONFIG));
      const ref = doc(db, "eq", "r24-2026");
      const snap = await getDoc(ref);
      if (snap.exists()){ const d=snap.data(); schedule=d.weeks||[]; media=d.media||media; }
      else { schedule=SEED.slice(); await setDoc(ref,{weeks:schedule, media}); }
      onSnapshot(ref, s=>{ if(s.exists()){ const d=s.data(); schedule=d.weeks||[]; media=d.media||{heroPhoto:"",saviorPhoto:""}; renderSchedule(); applyMedia(); } });
      remote = { save: obj => setDoc(ref, obj) };
      setSync(true); return;
    }catch(e){ console.warn("Firebase unavailable, using device storage.", e); }
  }
  try{ const raw=localStorage.getItem(LS_KEY); if(raw){ const d=JSON.parse(raw); schedule=d.weeks||[]; media=d.media||media; } else schedule=SEED.slice(); }
  catch{ schedule=SEED.slice(); }
  setSync(false);
}
async function persist(){
  const payload = { weeks: schedule, media };
  if (remote){ try{ await remote.save(payload); return; }catch(e){ console.warn(e); toast(U("saveFail")); } }
  try{ localStorage.setItem(LS_KEY, JSON.stringify(payload)); }catch(e){ toast(U("saveFail")); }
}

  p.classList.toggle("editable", signedIn);
  $("#swPhotoRemove").style.display = (signedIn && sp) ? "flex" : "none";
}

      <div class="lcard__foot">
        ${capIcon}<span class="taught-label">${U("taughtBy")}</span><span class="taught-name">${esc(w.teacher)||"—"}</span>
        <span class="foot-right">
          ${w.link?`<a class="lcard__open" href="${esc(w.link)}" target="_blank" rel="noopener">${linkIcon} ${U("openMaterial")}</a>`:""}
          ${editing?`<button class="lcard__edit" data-edit="${w.id}" aria-label="Edit">✎</button>`:""}
        </span>
      </div>
    </article>`;
  }).join("");
  document.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>openModal(b.getAttribute("data-edit"))));
}

// ---- editor sign-in ----
const signinModal = $("#signinModal");
let signedIn = sessionStorage.getItem("r24-editor")==="1";
function refreshAdminBar(){
  $("#editToggle").textContent = editing ? U("editDone") : U("editToggle");
  $("#addWeekBtn").style.display = editing ? "inline-block" : "none";
  $("#editNote").style.display = editing ? "inline" : "none";
  $("#signoutBtn").style.display = signedIn ? "inline-block" : "none";
  applyMedia();
}
$("#editToggle").addEventListener("click",()=>{
  if (!signedIn){ openSignin(); return; }
  editing = !editing; refreshAdminBar(); renderSchedule();
});
function openSignin(){ $("#fPass").value=""; $("#signinError").style.display="none"; signinModal.classList.add("on"); setTimeout(()=>$("#fPass").focus(),50); }
function closeSignin(){ signinModal.classList.remove("on"); }
function trySignin(){
  if ($("#fPass").value === EDIT_PASSCODE){
    signedIn = true; sessionStorage.setItem("r24-editor","1"); closeSignin();
    editing = true; refreshAdminBar(); renderSchedule();
  } else { $("#signinError").style.display="block"; }
}
$("#signinGo").addEventListener("click",trySignin);
$("#fPass").addEventListener("keydown",e=>{ if(e.key==="Enter") trySignin(); });
$("#signinCancel").addEventListener("click",closeSignin);
$("#signinScrim").addEventListener("click",closeSignin);
$("#signoutBtn").addEventListener("click",()=>{ signedIn=false; editing=false; sessionStorage.removeItem("r24-editor"); refreshAdminBar(); renderSchedule(); });
$("#addWeekBtn").addEventListener("click",()=>openModal(null));

// ---- edit modal ----
const modal = $("#modal");
let modalPhoto = "";
function showModalPhoto(){
  const prev = $("#modalPhotoPrev");
  if (modalPhoto){ prev.style.backgroundImage=`url("${modalPhoto}")`; prev.textContent=""; $("#photoClearBtn").style.display="inline-block"; }
  else { prev.style.backgroundImage=""; prev.textContent="No photo"; $("#photoClearBtn").style.display="none"; }
}
function openModal(id){
  editId = id;
  const w = id ? schedule.find(x=>x.id===id) : {date:"",title:"",titleTo:"",quote:"",quoteTo:"",speaker:"",role:"",teacher:"",photo:"",link:""};
  $("#modalTitle").textContent = id ? "Edit lesson" : "Add a lesson";
  $("#modalContext").innerHTML = id ? `<b>${esc(w.title)||"(untitled)"}</b>${w.speaker?" · "+esc(w.speaker):""}<br>${esc(w.date)}` : "New lesson — fill in the details below.";
  $("#fDate").value=w.date||""; $("#fTitle").value=w.title||""; $("#fTitleTo").value=w.titleTo||"";
  $("#fSpeaker").value=w.speaker||""; $("#fRole").value=w.role||"";
  $("#fQuote").value=w.quote||""; $("#fQuoteTo").value=w.quoteTo||""; $("#fLink").value=w.link||""; $("#fTeacher").value=w.teacher||"";
  modalPhoto = w.photo||""; showModalPhoto();
  $("#moreFields").style.display = id ? "none" : "block";
  $("#moreToggle").textContent = (id ? "More details ▾" : "Fewer details ▴");
  $("#deleteBtn").style.display = id ? "block" : "none";
  modal.classList.add("on"); setTimeout(()=>$("#fLink").focus(),50);
}
function closeModal(){ modal.classList.remove("on"); editId=null; }
$("#moreToggle").addEventListener("click",()=>{ const m=$("#moreFields"); const open=m.style.display!=="none";
  m.style.display = open?"none":"block"; $("#moreToggle").textContent = open?"More details ▾":"Fewer details ▴"; });
$("#photoPickBtn").addEventListener("click",()=>$("#fPhotoFile").click());
$("#fPhotoFile").addEventListener("change",async e=>{ const f=e.target.files[0]; if(!f) return;
  try{ modalPhoto = await processImage(f,320,0.8); showModalPhoto(); }catch{ toast(U("saveFail")); } e.target.value=""; });
$("#photoClearBtn").addEventListener("click",()=>{ modalPhoto=""; showModalPhoto(); });
$("#cancelBtn").addEventListener("click",closeModal);
$("#modalScrim").addEventListener("click",closeModal);
$("#saveBtn").addEventListener("click",async()=>{
  const data = { date:$("#fDate").value.trim(), title:$("#fTitle").value.trim(), titleTo:$("#fTitleTo").value.trim(),
    speaker:$("#fSpeaker").value.trim(), role:$("#fRole").value.trim(), photo:modalPhoto,
    quote:$("#fQuote").value.trim(), quoteTo:$("#fQuoteTo").value.trim(), link:$("#fLink").value.trim(), teacher:$("#fTeacher").value.trim() };
  if (editId){ Object.assign(schedule.find(x=>x.id===editId), data); }
  else { schedule.push({ id:"w"+Date.now(), ...data }); }
  await persist(); renderSchedule(); closeModal();
});
$("#deleteBtn").addEventListener("click",async()=>{
  if (!editId) return;
  if (!confirm("Remove this lesson?")) return;
  schedule = schedule.filter(x=>x.id!==editId);
  await persist(); renderSchedule(); closeModal();
});

// ---- images (upload, resize, compress) ----
function processImage(file, maxDim, q){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ev => { const img = new Image();
      img.onload = ()=>{ let w=img.width, h=img.height; const s=Math.min(1, maxDim/Math.max(w,h));
        w=Math.round(w*s); h=Math.round(h*s);
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        resolve(c.toDataURL("image/jpeg", q)); };
      img.onerror=reject; img.src=ev.target.result; };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
$("#heroPhotoPick").addEventListener("click",()=>$("#heroFile").click());
$("#heroFile").addEventListener("change",async e=>{ const f=e.target.files[0]; if(!f) return;
  try{ media.heroPhoto = await processImage(f,1000,0.72); await persist(); applyMedia(); }catch{ toast(U("saveFail")); } e.target.value=""; });
$("#heroPhotoRemove").addEventListener("click",async()=>{ media.heroPhoto=""; await persist(); applyMedia(); });
$("#swPhoto").addEventListener("click",()=>{ if(signedIn) $("#swFile").click(); });
$("#swFile").addEventListener("change",async e=>{ const f=e.target.files[0]; if(!f) return;
  try{ media.saviorPhoto = await processImage(f,1000,0.72); await persist(); applyMedia(); }catch{ toast(U("saveFail")); } e.target.value=""; });
$("#swPhotoRemove").addEventListener("click",async ev=>{ ev.stopPropagation(); media.saviorPhoto=""; await persist(); applyMedia(); });

// ---- share ----
let toastTimer;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("on"),2200); }
const shareModal = $("#shareModal");
const shareData = ()=>({ title:`${QUORUM.name} · EQ Instructor Guide`, text:`${QUORUM.name} — lesson schedule & Teaching in the Savior's Way`, url:location.href });
function openShare(){
  const d = shareData();
  $("#shEmail").href = `mailto:?subject=${encodeURIComponent(d.title)}&body=${encodeURIComponent(d.text+"\n\n"+d.url)}`;
  $("#shText").href  = `sms:?&body=${encodeURIComponent(d.text+" "+d.url)}`;
  $("#shMore").style.display = navigator.share ? "flex" : "none";
  shareModal.classList.add("on");
}
function closeShare(){ shareModal.classList.remove("on"); }
$("#shareBtn").addEventListener("click",openShare);
$("#shareScrim").addEventListener("click",closeShare);
$("#shareCancel").addEventListener("click",closeShare);
$("#shCopy").addEventListener("click",async()=>{ try{ await navigator.clipboard.writeText(location.href); toast(U("copied")); }catch{ prompt("Copy this link:", location.href); } closeShare(); });
$("#shMore").addEventListener("click",async()=>{ if(navigator.share){ try{ await navigator.share(shareData()); }catch(e){} } closeShare(); });
$("#shEmail").addEventListener("click",closeShare);
$("#shText").addEventListener("click",closeShare);

document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ [modal,shareModal,signinModal].forEach(m=>m.classList.remove("on")); }});

// ---- go ----
$("#manualCta").href = MANUAL_URL;
await initStore();
refreshAdminBar();
applyLang();   // sets all chrome + renders schedule + SW
applyMedia();  // header + Savior's Way photos
</script>
</body>
